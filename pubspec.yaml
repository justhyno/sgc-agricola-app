name: sgc_agricola_app
description: SGC Agrícola — App Mobile para gestão de vendas e stock
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.3

  # Local database (offline-first)
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Auth / secure storage
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.1

  # Barcode scanner (camera)
  mobile_scanner: ^5.1.1

  # Bluetooth thermal printer
  print_bluetooth_thermal: ^1.0.10

  # ESC/POS receipt generation
  esc_pos_utils_plus: ^2.0.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
